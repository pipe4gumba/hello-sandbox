# Generated by `ap init` from .agentplane/policy.yml and profiles.yml.
# Re-run `ap init` after editing either file; hand edits are overwritten.
name: Agent task
description: Queue a governed task for an AI agent
title: '[agent] '
labels:
- agent:run
body:
- type: markdown
  attributes:
    value: 'Fill this in and agentplane does the rest: it writes the canonical task block into this issue,
      applies the matching labels, resolves policy, and runs the task. You never need to write YAML or
      pick labels by hand.'
- type: dropdown
  id: domain
  attributes:
    label: Domain
    description: Decides the default gate, writable paths, and capabilities.
    options:
    - code
    - docs
    - ideation
    - infra
  validations:
    required: true
- type: dropdown
  id: gate
  attributes:
    label: Gate
    description: How the result is approved. Leave on the default to use the domain's.
    options:
    - (policy default)
    - auto
    - pr
    - plan
  validations:
    required: false
- type: dropdown
  id: tool
  attributes:
    label: Tool
    description: Which agent runs it. Leave on the default unless you need a specific tool.
    options:
    - (policy default)
    - claude-code
    - codex
    - codex-litellm
    - copilot
    - ghaw
    - grok
    - hermes
    - openclaw
    - opencode
    - pi
  validations:
    required: false
- type: dropdown
  id: runner
  attributes:
    label: Runner
    description: Which execution lane. The runner must support the tool.
    options:
    - (policy default)
    - ghaw-demo
    - hosted-codex
    - hosted-copilot
    - local-cli
    - self-hosted
  validations:
    required: false
- type: textarea
  id: goal
  attributes:
    label: Goal
    description: What should change, and why. Write it for someone who has not read the code.
    placeholder: Replace the hand-rolled retry loop in the uploader with tenacity.
  validations:
    required: true
- type: textarea
  id: acceptance
  attributes:
    label: Acceptance
    description: The observable evidence that this is done. Becomes the PR checklist.
    placeholder: Upload retries three times with backoff; existing tests still pass.
  validations:
    required: false
- type: input
  id: write
  attributes:
    label: Writable paths (optional)
    description: Comma-separated globs. This can only narrow the domain's allowlist, never widen it.
    placeholder: src/uploader/**, tests/test_uploader.py
  validations:
    required: false
- type: input
  id: context
  attributes:
    label: Context files (optional)
    description: Comma-separated paths the agent should read first.
    placeholder: docs/design/uploader.md
  validations:
    required: false
