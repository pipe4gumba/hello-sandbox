# agentplane — the execution workflow.
#
# Two entry shapes, one body:
#   * a human adds `agent:run` to an issue;
#   * another agentplane workflow calls this one (gate approval, /agent run).
# Everything downstream of `resolve` is fail-closed: no runner, tool, gate or
# digest means no execution.
name: agentplane run

on:
  issues:
    types: [labeled]
  workflow_call:
    inputs:
      issue:
        description: Issue number to execute
        required: true
        type: string
      approved:
        description: Set true when a plan gate has already been approved
        required: false
        default: false
        type: boolean

# One run per issue. Attempts queue instead of racing over the same worktree.
concurrency:
  group: agent-${{ inputs.issue || github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  resolve:
    # `inputs.issue` is empty on the issues trigger, so this reads as:
    # called by another workflow, or the label just added was agent:run.
    if: inputs.issue != '' || github.event.label.name == 'agent:run'
    runs-on: ubuntu-latest
    outputs:
      issue: ${{ inputs.issue || github.event.issue.number }}
      skip: ${{ steps.guard.outputs.skip }}
      approved: ${{ steps.guard.outputs.approved }}
      runner: ${{ steps.bundle.outputs.runner }}
      tool: ${{ steps.bundle.outputs.tool }}
      gate: ${{ steps.bundle.outputs.gate }}
      digest: ${{ steps.bundle.outputs.digest }}
    env:
      GH_TOKEN: ${{ github.token }}
      ISSUE: ${{ inputs.issue || github.event.issue.number }}
      AGENTPLANE_INSTALL: ${{ vars.AGENTPLANE_INSTALL || 'git+https://github.com/pipe4gumba/agentplane' }}
      AGENTPLANE_SSH_KEY: ${{ secrets.AGENTPLANE_SSH_KEY }}
    steps:
      - name: Read issue labels
        id: guard
        run: |
          set -euo pipefail
          labels=$(gh issue view "$ISSUE" --repo "$GITHUB_REPOSITORY" --json labels -q '.labels[].name')
          if grep -qx 'agent:done' <<< "$labels"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=agentplane::Issue #$ISSUE carries agent:done, so agentplane skipped it. Remove agent:done to run it again."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
          # An approved plan is a label on the issue, not only an input to
          # this workflow. `ap run` reads the same label, so a `/agent run`
          # after an approval executes instead of re-posting the plan.
          if [ "${{ inputs.approved }}" = "true" ] || grep -qx 'gate:approved' <<< "$labels"; then
            echo "approved=true" >> "$GITHUB_OUTPUT"
          else
            echo "approved=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.skip != 'true'

      - uses: astral-sh/setup-uv@v5
        if: steps.guard.outputs.skip != 'true'

      - name: Install agentplane
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          # agentplane may itself live in a private repository. A read-only
          # deploy key in AGENTPLANE_SSH_KEY grants exactly that one repo,
          # and is revocable on its own; without it the install URL is used
          # as-is, which is right for a public agentplane.
          install="$AGENTPLANE_INSTALL"
          if [ -n "${AGENTPLANE_SSH_KEY:-}" ]; then
            key="$RUNNER_TEMP/agentplane_key"
            umask 077 && printf '%s\n' "$AGENTPLANE_SSH_KEY" > "$key"
            export GIT_SSH_COMMAND="ssh -i $key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
            install="${install/git+https:\/\/github.com\//git+ssh://git@github.com/}"
          fi
          uv venv "$RUNNER_TEMP/apvenv"
          VIRTUAL_ENV="$RUNNER_TEMP/apvenv" uv pip install "$install"
          rm -f "$RUNNER_TEMP/agentplane_key"
          echo "$RUNNER_TEMP/apvenv/bin" >> "$GITHUB_PATH"

      - name: Normalize issue form into a task spec
        if: steps.guard.outputs.skip != 'true'
        run: python -m agentplane.surface formsync "$ISSUE"

      - name: Resolve task
        id: bundle
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          if ! ap resolve "$ISSUE" > bundle.txt 2>&1; then
            python -m agentplane.surface remediate "$ISSUE" bundle.txt
            exit 1
          fi
          python -m agentplane.surface bundle bundle.txt >> "$GITHUB_OUTPUT"

      - name: Post resolved status
        if: steps.guard.outputs.skip != 'true'
        run: python -m agentplane.surface status "$ISSUE" --step running

  # Plan-gate domains stop here: a plan comment is posted for approval and
  # nothing is executed until gate:approved (or /agent approve) arrives.
  plan:
    needs: resolve
    if: needs.resolve.outputs.skip != 'true' && needs.resolve.outputs.gate == 'plan' && needs.resolve.outputs.approved != 'true'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      ISSUE: ${{ needs.resolve.outputs.issue }}
      AGENTPLANE_INSTALL: ${{ vars.AGENTPLANE_INSTALL || 'git+https://github.com/pipe4gumba/agentplane' }}
      AGENTPLANE_SSH_KEY: ${{ secrets.AGENTPLANE_SSH_KEY }}
      AGENTPLANE_EVIDENCE_DIR: ${{ github.workspace }}/.agentplane-evidence
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install agentplane
        run: |
          set -euo pipefail
          # agentplane may itself live in a private repository. A read-only
          # deploy key in AGENTPLANE_SSH_KEY grants exactly that one repo,
          # and is revocable on its own; without it the install URL is used
          # as-is, which is right for a public agentplane.
          install="$AGENTPLANE_INSTALL"
          if [ -n "${AGENTPLANE_SSH_KEY:-}" ]; then
            key="$RUNNER_TEMP/agentplane_key"
            umask 077 && printf '%s\n' "$AGENTPLANE_SSH_KEY" > "$key"
            export GIT_SSH_COMMAND="ssh -i $key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
            install="${install/git+https:\/\/github.com\//git+ssh://git@github.com/}"
          fi
          uv venv "$RUNNER_TEMP/apvenv"
          VIRTUAL_ENV="$RUNNER_TEMP/apvenv" uv pip install "$install"
          rm -f "$RUNNER_TEMP/agentplane_key"
          echo "$RUNNER_TEMP/apvenv/bin" >> "$GITHUB_PATH"
      - name: Post plan for approval
        run: |
          mkdir -p "$AGENTPLANE_EVIDENCE_DIR"
          python -m agentplane.surface plan "$ISSUE"
      - uses: actions/upload-artifact@v4
        with:
          name: agentplane-plan-${{ needs.resolve.outputs.digest }}
          path: ${{ env.AGENTPLANE_EVIDENCE_DIR }}
          # The evidence directory is dot-prefixed, and upload-artifact
          # skips hidden paths by default — without this, every envelope is
          # silently dropped and the only trace is a warning nobody reads.
          include-hidden-files: true
          if-no-files-found: error

  execute:
    needs: resolve
    if: needs.resolve.outputs.skip != 'true' && (needs.resolve.outputs.gate != 'plan' || needs.resolve.outputs.approved == 'true')
    # Self-hosted lanes carry the tool binaries and long-lived credentials;
    # everything else stays on hosted runners.
    runs-on: ${{ needs.resolve.outputs.runner == 'self-hosted' && 'agent' || 'ubuntu-latest' }}
    env:
      # Ambient auth for gh reads before the app token is minted (hosted
      # runners have no other gh credential). Provider calls that carry the
      # minted app token override this per-invocation, so PRs still open
      # under the app identity.
      GH_TOKEN: ${{ github.token }}
      ISSUE: ${{ needs.resolve.outputs.issue }}
      TOOL: ${{ needs.resolve.outputs.tool }}
      GATE: ${{ needs.resolve.outputs.gate }}
      AGENTPLANE_APP: agentplane-ci
      AGENTPLANE_AGENTPLANE_CI_APP_ID: ${{ secrets.AGENTPLANE_CI_APP_ID }}
      AGENTPLANE_AGENTPLANE_CI_PRIVATE_KEY: ${{ secrets.AGENTPLANE_CI_APP_PRIVATE_KEY }}
      AGENTPLANE_INSTALL: ${{ vars.AGENTPLANE_INSTALL || 'git+https://github.com/pipe4gumba/agentplane' }}
      AGENTPLANE_SSH_KEY: ${{ secrets.AGENTPLANE_SSH_KEY }}
      AGENTPLANE_EVIDENCE_DIR: ${{ github.workspace }}/.agentplane-evidence
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      # The gateway's address is configuration (it lives in profiles.yml),
      # not a credential. Only the key is a secret. A gateway on loopback is
      # reachable from the self-hosted runner only.
      LITELLM_KEY: ${{ secrets.LITELLM_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5

      - name: Install agentplane
        run: |
          set -euo pipefail
          # agentplane may itself live in a private repository. A read-only
          # deploy key in AGENTPLANE_SSH_KEY grants exactly that one repo,
          # and is revocable on its own; without it the install URL is used
          # as-is, which is right for a public agentplane.
          install="$AGENTPLANE_INSTALL"
          if [ -n "${AGENTPLANE_SSH_KEY:-}" ]; then
            key="$RUNNER_TEMP/agentplane_key"
            umask 077 && printf '%s\n' "$AGENTPLANE_SSH_KEY" > "$key"
            export GIT_SSH_COMMAND="ssh -i $key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
            install="${install/git+https:\/\/github.com\//git+ssh://git@github.com/}"
          fi
          uv venv "$RUNNER_TEMP/apvenv"
          VIRTUAL_ENV="$RUNNER_TEMP/apvenv" uv pip install "$install"
          rm -f "$RUNNER_TEMP/agentplane_key"
          echo "$RUNNER_TEMP/apvenv/bin" >> "$GITHUB_PATH"

      # Git identity is set by agentplane when minting the app token, not here.

      # Hosted runners carry no agent CLIs. Self-hosted runners carry their
      # own, so this is a no-op there. Without it the lane fails closed with
      # "not on PATH" — correct, but only after resolution has already run.
      - name: Install the tool (hosted runners only)
        if: needs.resolve.outputs.runner != 'self-hosted'
        env:
          NPM_PACKAGE: ${{ vars.AGENTPLANE_TOOL_NPM_codex || '@openai/codex' }}
        run: |
          set -euo pipefail
          case "$TOOL" in
            codex|codex-litellm) npm install -g "$NPM_PACKAGE" ;;
            claude-code)         npm install -g @anthropic-ai/claude-code ;;
            *)
              echo "::notice title=agentplane::No hosted install recipe for '$TOOL'; the lane will fail closed if the binary is absent."
              ;;
          esac

      - name: Execute
        id: exec
        run: |
          set -o pipefail
          mkdir -p "$AGENTPLANE_EVIDENCE_DIR"
          # `ap exec` verifies changed paths (tier 3), writes the envelope, and
          # opens the PR itself. A verification failure exits nonzero with no PR.
          ap exec "$ISSUE" --tool "$TOOL" 2>&1 | tee exec.out
          pr=$(sed -n 's/^PR: //p' exec.out | head -n1)
          echo "pr=$pr" >> "$GITHUB_OUTPUT"

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentplane-run-${{ needs.resolve.outputs.digest }}
          path: ${{ env.AGENTPLANE_EVIDENCE_DIR }}
          # The evidence directory is dot-prefixed, and upload-artifact
          # skips hidden paths by default — without this, every envelope is
          # silently dropped and the only trace is a warning nobody reads.
          include-hidden-files: true
          if-no-files-found: error

      - name: Enable auto-merge
        if: success() && env.GATE == 'auto' && steps.exec.outputs.pr != ''
        run: gh pr merge "${{ steps.exec.outputs.pr }}" --auto --squash

      - name: Post final status
        if: always()
        run: python -m agentplane.surface status "$ISSUE" --step ${{ job.status == 'success' && 'done' || 'failed' }}
